  <nav><a href="index.html">Cockpit</a><a href="academics.html">Statskundskab</a><a href="training.html">Træning</a><a href="briefing.html" class="active">Briefing</a></nav>

<div class="main main--narrow" id="app">
  <div class="loading-state"><div class="spinner"></div><div class="loading-label">Starter…</div></div>
</div>
<footer>Personal AI System · Briefing · Forår 2026</footer>

<script>
const SUPABASE_URL = "https://kgiepplwarutwmzvvezc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnaWVwcGx3YXJ1dHdtenZ2ZXpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTc4MDksImV4cCI6MjA5MDM5MzgwOX0.8DFz0fGFJn5qocz4jwfPbnXcoy-1WHgSojDBS8enKec";
const CC = {IP3:{bg:'#6ea8ff',light:'rgba(110,168,255,.14)',text:'#6ea8ff'},Økonomi:{bg:'#ffb86b',light:'rgba(255,184,107,.14)',text:'#ffb86b'},Metode:{bg:'#6ee895',light:'rgba(110,232,149,.14)',text:'#6ee895'},IR2:{bg:'#818cf8',light:'rgba(129,140,248,.14)',text:'#818cf8'}};
const WEEK_DATES = {6:"2/2–8/2",7:"9/2–15/2",8:"16/2–22/2",9:"23/2–1/3",10:"2/3–8/3",11:"9/3–15/3",12:"16/3–22/3",13:"23/3–29/3",14:"30/3–5/4",15:"6/4–12/4",16:"13/4–19/4",17:"20/4–26/4",18:"27/4–3/5",19:"4/5–10/5",20:"11/5–17/5",21:"18/5–24/5"};

let apiKey = localStorage.getItem('briefing_api_key') || '';
let state = { loading: false, error: null, data: null, briefing: '', view: 'briefing' };

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

function md(src){
  const lines=(src||'').replace(/\r\n/g,'\n').split('\n');
  const out=[]; let i=0;
  const inline=s=>esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/(^|\s)_([^_\n]+)_/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    let m;
    if(m=ln.match(/^(#{1,3})\s+(.*)$/)){out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`);i++;continue;}
    if(/^\s*[-*]\s+/.test(ln)){
      const items=[];
      while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){items.push(`<li>${inline(lines[i].replace(/^\s*[-*]\s+/,''))}</li>`);i++;}
      out.push(`<ul>${items.join('')}</ul>`);continue;
    }
    if(/^\s*\d+\.\s+/.test(ln)){
      const items=[];
      while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){items.push(`<li>${inline(lines[i].replace(/^\s*\d+\.\s+/,''))}</li>`);i++;}
      out.push(`<ol>${items.join('')}</ol>`);continue;
    }
    // paragraph: collect until blank line
    const para=[];
    while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^(#{1,3})\s+/.test(lines[i])&&!/^\s*[-*]\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])){para.push(lines[i]);i++;}
    out.push(`<p>${inline(para.join(' '))}</p>`);
  }
  return out.join('');
}

function currentWeek(){
  const now=new Date(),jan1=new Date(now.getFullYear(),0,1);
  return Math.ceil((Math.floor((now-jan1)/86400000)+jan1.getDay()+1)/7);
}

async function supa(path){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  if(!res.ok)throw new Error(`Supabase ${res.status}`);
  return res.json();
}

async function fetchData(){
  const week=currentWeek();
  const [readings,events]=await Promise.all([
    supa('readings?order=week.asc,id.asc&select=id,course,week,title,author,pages,status,priority'),
    supa('events?order=week.asc'),
  ]);
  const unread=readings.filter(r=>r.status!=='læst');
  const thisWeek=unread.filter(r=>r.week===week);
  const nextWeek=unread.filter(r=>r.week===week+1);
  const backlog=unread.filter(r=>r.week<week);
  const highPri=unread.filter(r=>r.priority==='høj');
  const progress={};
  for(const c of ['IP3','Økonomi','Metode']){
    const ct=readings.filter(r=>r.course===c),done=ct.filter(r=>r.status==='læst').length;
    progress[c]={total:ct.length,done,pct:ct.length?Math.round(100*done/ct.length):0};
  }
  const upcoming=events.filter(e=>(e.type==='deadline'||e.type==='exam')&&e.week>=week&&e.week<=week+4);
  return {week,readings,unread,thisWeek,nextWeek,backlog,highPri,progress,upcoming,events};
}

async function generateBriefing(data){
  const w=data.week;
  const prompt=`Du er Jakobs personlige akademiske assistent. Generer en ugentlig briefing på dansk.

Uge ${w} (${WEEK_DATES[w]||'ukendt'})

Ulæste tekster denne uge (uge ${w}): ${data.thisWeek.length}
${data.thisWeek.slice(0,8).map(r=>`- [${r.course}] ${r.title} — ${r.author} (${r.priority})`).join('\n')||'Ingen'}

Ulæste næste uge (uge ${w+1}): ${data.nextWeek.length}
${data.nextWeek.slice(0,6).map(r=>`- [${r.course}] ${r.title} — ${r.author}`).join('\n')||'Ingen'}

Backlog (tidligere uger, ulæste): ${data.backlog.length} tekster
Høj prioritet backlog: ${data.backlog.filter(r=>r.priority==='høj').slice(0,4).map(r=>`[${r.course} uge ${r.week}] ${r.title}`).join(', ')||'Ingen'}

Fremgang: ${Object.entries(data.progress).map(([c,p])=>`${c} ${p.done}/${p.total} (${p.pct}%)`).join(' · ')}

Kommende deadlines:
${data.upcoming.map(e=>`- ${e.date||`Uge ${e.week}`}: ${e.label} (${e.course||'alle fag'})`).join('\n')||'Ingen inden for 4 uger'}

Skriv i 3-4 korte afsnit:
1. Ugens overblik — hvad sker der, vigtige datoer
2. Læsefokus — hvad er vigtigst at læse nu, hvad fra backlog
3. Næste uge — hvad bør forberedes
4. Advarsler — kun hvis relevant

Vær direkte og konkret. Ingen fyld. Navngiv specifikke tekster ved titel og forfatter.`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]}),
  });
  if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(`Claude API ${res.status}: ${t.slice(0,200)}`);}
  const json=await res.json();
  return json.content.map(b=>b.text||'').join('');
}

function saveKey(){
  const val=document.getElementById('api-key-input').value.trim();
  if(!val.startsWith('sk-ant-')){alert('Nøglen skal starte med sk-ant-');return;}
  apiKey=val;
  localStorage.setItem('briefing_api_key',val);
  run();
}

function resetKey(){
  apiKey='';
  localStorage.removeItem('briefing_api_key');
  render();
}

async function run(){
  state.loading=true;state.error=null;render();
  try{
    state.data=await fetchData();
    state.briefing=await generateBriefing(state.data);
    state.loading=false;render();
  }catch(e){
    state.error=e.message;state.loading=false;render();
  }
}

function setView(v){state.view=v;render();}

function render(){
  const app=document.getElementById('app');

  if(!apiKey){
    app.innerHTML=`
      <div class="setup-panel">
        <div class="page-hd"><h1 class="page-title">Briefing <em>Intelligence</em></h1><div class="page-sub">Ugentlig AI-briefing baseret på dine data</div></div>
        <div class="panel">
          <p>Briefingen bruger Claude til at generere et ugentligt overblik baseret på dine Supabase-data — ulæste tekster, backlog, deadlines.<br><br>Indsæt din Anthropic API-nøgle herunder. Den gemmes i din browser og er aldrig synlig for andre.</p>
          <input class="setup-input" type="password" id="api-key-input" placeholder="sk-ant-api03-…" autocomplete="off"/>
          <button class="btn" onclick="saveKey()">Gem og generer</button>
          <div class="setup-note">Gemt lokalt i localStorage · aldrig sendt til en server · du skriver det kun én gang</div>
        </div>
      </div>`;
    return;
  }

  if(state.loading){
    app.innerHTML=`
      <div class="page-hd"><h1 class="page-title">Briefing <em>Intelligence</em></h1><div class="page-sub">Henter data og genererer briefing…</div></div>
      <div class="loading-state"><div class="spinner"></div><div class="loading-label">Henter data fra Supabase · genererer med Claude…</div></div>`;
    return;
  }

  if(state.error){
    app.innerHTML=`
      <div class="page-hd"><h1 class="page-title">Briefing <em>Intelligence</em></h1><div class="page-sub">Fejl ved generering</div></div>
      <div class="error-panel">${esc(state.error)}</div>
      <div class="btn-row">
        <button class="btn" onclick="run()">Prøv igen</button>
        <button class="btn btn-sec" onclick="resetKey()">Skift API-nøgle</button>
      </div>`;
    return;
  }

  if(!state.data){run();return;}

  const d=state.data;
  const w=d.week;

  app.innerHTML=`
    <div class="page-hd"><h1 class="page-title">Briefing <em>Intelligence</em></h1><div class="page-sub">Uge ${w} · ${WEEK_DATES[w]||''} · Forår 2026</div></div>

    <div class="stats-row">
      <div class="stat" style="--accent:var(--red)"><div class="stat-val" style="color:var(--red)">${d.thisWeek.length}</div><div class="stat-label">Ulæst denne uge</div></div>
      <div class="stat" style="--accent:var(--amber)"><div class="stat-val" style="color:var(--amber)">${d.backlog.length}</div><div class="stat-label">Backlog</div></div>
      <div class="stat" style="--accent:var(--purple)"><div class="stat-val" style="color:var(--purple)">${d.highPri.length}</div><div class="stat-label">Høj prioritet</div></div>
      <div class="stat" style="--accent:var(--green)"><div class="stat-val" style="color:var(--green)">${d.upcoming.length}</div><div class="stat-label">Deadlines (4 uger)</div></div>
    </div>

    <div style="display:flex;gap:.375rem;margin-bottom:1.5rem">
      <button class="btn${state.view==='briefing'?'':' btn-sec'}" onclick="setView('briefing')">Briefing</button>
      <button class="btn${state.view==='data'?'':' btn-sec'}" onclick="setView('data')">Rådata</button>
    </div>

    <div id="view-content"></div>

    <div class="btn-row">
      <button class="btn" onclick="run()">Generer ny</button>
      <button class="btn btn-sec" onclick="resetKey()">Skift nøgle</button>
    </div>`;

  const vc=document.getElementById('view-content');

  if(state.view==='briefing'){
    vc.innerHTML=`<div class="panel"><div class="briefing-text">${md(state.briefing)}</div></div>`;
  } else {
    // Fremgang
    let h=`<div class="sh" style="--accent:var(--blue);margin-top:0">Fremgang</div><div class="panel">`;
    for(const [c,p] of Object.entries(d.progress)){
      const cc=CC[c]||{bg:'var(--t3)'};
      h+=`<div class="prog-row"><span class="prog-label" style="color:${cc.bg}">${c}</span><div class="prog-bar"><div class="prog-fill" style="width:${Math.max(p.pct,1)}%;background:${cc.bg}"></div></div><span class="prog-pct">${p.done}/${p.total}</span></div>`;
    }
    h+=`</div>`;

    // Denne uge
    h+=`<div class="sh" style="--accent:var(--green)">Denne uge (uge ${w})</div><div class="panel">`;
    if(d.thisWeek.length){
      h+=d.thisWeek.map(r=>{const cc=CC[r.course]||{bg:'var(--t3)',light:'var(--s2)',text:'var(--t2)'};return`<div class="reading-row"><div class="reading-title">${esc(r.title)}<br><span style="font-size:.6875rem;color:var(--t3)">${esc(r.author)}</span></div><div><span class="badge" style="background:${cc.bg};color:#0a0a0d">${r.course}</span></div></div>`;}).join('');
    } else h+=`<div style="font-size:.875rem;color:var(--t3);padding:.25rem 0">Alle tekster læst</div>`;
    h+=`</div>`;

    // Deadlines
    if(d.upcoming.length){
      h+=`<div class="sh" style="--accent:var(--amber)">Kommende deadlines</div><div class="panel">`;
      h+=d.upcoming.map(e=>{const cc=CC[e.course]||null;return`<div class="reading-row"><span class="reading-title">${esc(e.label)}${cc?` <span class="badge" style="background:${cc.bg};color:#0a0a0d;margin-left:4px">${e.course}</span>`:''}</span><span class="reading-meta">${e.date||`Uge ${e.week}`}</span></div>`;}).join('');
      h+=`</div>`;
    }
    vc.innerHTML=h;
  }
}

// Start
if(apiKey){run();}else{render();}
</script>
